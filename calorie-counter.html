<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriTrack — Calorie Counter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Fraunces:ital,wght@0,300;0,400;1,300;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="calorie-counter.css">
</head>
<body>
<div class="app-wrap">

  <!-- HEADER -->
  <div class="app-header">
    <div class="app-logo">
      <div class="logo-leaf">🌿</div>
      <div>
        <div class="app-name">Nutri<em>Track</em></div>
      </div>
    </div>
    <div class="app-tagline" id="todayLabel"></div>
  </div>

  <!-- GOAL CARD -->
  <div class="goal-card">
    <div class="goal-top">
      <div>
        <div class="goal-label">Today's Intake</div>
        <div class="goal-numbers">
          <div class="goal-consumed" id="consumedCals">0</div>
          <div>
            <div class="goal-slash">/</div>
          </div>
          <div class="goal-target" id="targetLabel">2000</div>
        </div>
        <div class="goal-kcal">kcal consumed</div>
        <div class="goal-settings">
          <input type="number" id="goalInput" placeholder="Goal" min="500" max="5000">
          <button onclick="setGoal()">Set</button>
        </div>
      </div>
      <div class="goal-remaining">
        <div class="remaining-num" id="remainingNum">2000</div>
        <div class="remaining-label" id="remainingLabel">kcal left</div>
      </div>
    </div>
    <div class="goal-bar-track">
      <div class="goal-bar-fill" id="goalBarFill" style="width:0%"></div>
    </div>
    <div class="goal-bar-labels">
      <span>0</span>
      <span id="halfGoal">1000</span>
      <span id="fullGoal">2000 kcal</span>
    </div>
  </div>

  <!-- MACROS -->
  <div class="macros-row">
    <div class="macro-card">
      <div class="macro-icon">🍗</div>
      <div class="macro-val" id="proteinTotal">0</div>
      <div class="macro-unit">grams</div>
      <div class="macro-label">Protein</div>
    </div>
    <div class="macro-card">
      <div class="macro-icon">🌾</div>
      <div class="macro-val" id="carbsTotal">0</div>
      <div class="macro-unit">grams</div>
      <div class="macro-label">Carbs</div>
    </div>
    <div class="macro-card">
      <div class="macro-icon">🥑</div>
      <div class="macro-val" id="fatTotal">0</div>
      <div class="macro-unit">grams</div>
      <div class="macro-label">Fat</div>
    </div>
  </div>

  <!-- ADD MEAL -->
  <div class="add-section">
    <div class="section-label">// Log a meal</div>
    <div class="add-grid">
      <input type="text" class="form-input" id="foodName" placeholder="Food name (e.g. Grilled Chicken)">
      <button class="add-food-btn" onclick="addFood()">+ Log</button>
    </div>
    <div class="add-grid-bottom">
      <input type="number" class="form-input" id="foodCals" placeholder="Calories" min="0">
      <input type="number" class="form-input" id="foodProtein" placeholder="Protein (g)" min="0">
      <input type="number" class="form-input" id="foodCarbs" placeholder="Carbs (g)" min="0">
      <input type="number" class="form-input" id="foodFat" placeholder="Fat (g)" min="0">
    </div>
  </div>

  <!-- QUICK ADD -->
  <div class="quick-section">
    <div class="quick-label">// Quick add common foods</div>
    <div class="quick-grid" id="quickGrid"></div>
  </div>

  <!-- LOG -->
  <div class="log-section">
    <div class="log-header">
      <div class="log-title">// Today's food log</div>
      <button class="log-clear" onclick="clearLog()">Clear all</button>
    </div>
    <div class="log-list" id="logList"></div>
    <div class="log-empty" id="logEmpty">
      <p>No meals logged yet.<br>Add something above!</p>
    </div>
  </div>

</div>

<script src="calorie-counter.js"></script>
</body>
</html>
