<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriTrack — Calorie Counter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Fraunces:ital,wght@0,300;0,400;1,300;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f4f0;
    --surface: #ffffff;
    --surface2: #f7f9f7;
    --border: #dde5dd;
    --green: #2d7a4f;
    --green-light: #e8f4ed;
    --green-mid: #4caf7d;
    --orange: #d4732a;
    --orange-light: #fdf0e6;
    --red: #c0392b;
    --red-light: #fdecea;
    --blue: #2980b9;
    --blue-light: #eaf4fb;
    --text: #1a2e1a;
    --muted: #6b826b;
    --border-dark: #c5d5c5;
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'Plus Jakarta Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 2rem 1rem 5rem;
  }

  .app-wrap {
    max-width: 600px;
    margin: 0 auto;
  }

  /* HEADER */
  .app-header {
    margin-bottom: 1.75rem;
  }

  .app-logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.25rem;
  }

  .logo-leaf {
    width: 36px; height: 36px;
    background: var(--green);
    border-radius: 50% 50% 50% 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    transform: rotate(-10deg);
  }

  .app-name {
    font-family: var(--serif);
    font-size: 1.8rem;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .app-name em { font-style: italic; color: var(--green); }

  .app-tagline {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-left: 0.25rem;
  }

  /* GOAL CARD */
  .goal-card {
    background: var(--green);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
    color: white;
    position: relative;
    overflow: hidden;
  }

  .goal-card::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }

  .goal-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.25rem;
  }

  .goal-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin-bottom: 0.3rem;
  }

  .goal-numbers {
    display: flex;
    align-items: baseline;
    gap: 0.4rem;
  }

  .goal-consumed {
    font-family: var(--serif);
    font-size: 3rem;
    font-weight: 300;
    line-height: 1;
  }

  .goal-slash {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: rgba(255,255,255,0.6);
  }

  .goal-target {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: rgba(255,255,255,0.8);
  }

  .goal-kcal {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.08em;
    margin-top: 0.2rem;
  }

  .goal-remaining {
    text-align: right;
  }

  .remaining-num {
    font-family: var(--serif);
    font-size: 1.6rem;
    font-weight: 300;
    line-height: 1;
  }

  .remaining-label {
    font-family: var(--mono);
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin-top: 0.2rem;
  }

  .goal-bar-track {
    height: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 0.6rem;
  }

  .goal-bar-fill {
    height: 100%;
    border-radius: 10px;
    background: rgba(255,255,255,0.85);
    transition: width 0.5s ease;
    max-width: 100%;
  }

  .goal-bar-fill.over { background: #ffb347; }

  .goal-bar-labels {
    display: flex;
    justify-content: space-between;
  }

  .goal-bar-labels span {
    font-family: var(--mono);
    font-size: 0.55rem;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.65);
  }

  /* MACROS */
  .macros-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }

  .macro-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
  }

  .macro-icon { font-size: 1.4rem; margin-bottom: 0.4rem; }

  .macro-val {
    font-family: var(--serif);
    font-size: 1.4rem;
    font-weight: 300;
    color: var(--text);
    line-height: 1;
  }

  .macro-unit {
    font-family: var(--mono);
    font-size: 0.55rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 0.2rem;
  }

  .macro-label {
    font-family: var(--mono);
    font-size: 0.55rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 0.3rem;
  }

  /* ADD MEAL */
  .add-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .add-grid {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0.6rem;
    margin-bottom: 0.6rem;
  }

  .add-grid-bottom {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 0.6rem;
  }

  .form-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 0.9rem;
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.85rem;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }

  .form-input::placeholder { color: var(--muted); font-size: 0.8rem; }
  .form-input:focus { border-color: var(--green); }

  .form-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 0.6rem;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.65rem;
    outline: none;
    cursor: pointer;
    width: 100%;
    transition: border-color 0.2s;
  }

  .form-select:focus { border-color: var(--green); }

  .add-food-btn {
    background: var(--green);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.7rem 1.25rem;
    font-family: var(--sans);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .add-food-btn:hover { background: #236040; }
  .add-food-btn:active { transform: scale(0.97); }

  /* QUICK ADD */
  .quick-section {
    margin-bottom: 1.25rem;
  }

  .quick-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .quick-grid {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .quick-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.45rem 0.9rem;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .quick-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }

  /* LOG */
  .log-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .log-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .log-title {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .log-clear {
    background: transparent;
    border: none;
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: color 0.2s;
  }

  .log-clear:hover { color: var(--red); }

  .log-list { }

  .log-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.9rem 1.5rem;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-6px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .log-item:last-child { border-bottom: none; }
  .log-item:hover { background: var(--surface2); }

  .log-meal-icon {
    font-size: 1.3rem;
    width: 32px;
    text-align: center;
    flex-shrink: 0;
  }

  .log-body { flex: 1; min-width: 0; }

  .log-name {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .log-meta {
    display: flex;
    gap: 0.75rem;
    margin-top: 0.2rem;
  }

  .log-meta span {
    font-family: var(--mono);
    font-size: 0.55rem;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .log-cals {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 300;
    color: var(--text);
    flex-shrink: 0;
  }

  .log-del {
    background: transparent;
    border: none;
    color: var(--border-dark);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 0.2rem;
    transition: color 0.2s;
    flex-shrink: 0;
  }

  .log-del:hover { color: var(--red); }

  .log-empty {
    padding: 3rem 1rem;
    text-align: center;
    display: none;
  }

  .log-empty p {
    font-family: var(--serif);
    font-style: italic;
    color: var(--muted);
    font-size: 0.95rem;
  }

  /* Goal settings */
  .goal-settings {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }

  .goal-settings input {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    padding: 0.3rem 0.6rem;
    color: white;
    font-family: var(--mono);
    font-size: 0.7rem;
    width: 80px;
    outline: none;
  }

  .goal-settings input::placeholder { color: rgba(255,255,255,0.5); }

  .goal-settings button {
    background: rgba(255,255,255,0.2);
    border: none;
    border-radius: 6px;
    padding: 0.3rem 0.7rem;
    color: white;
    font-family: var(--mono);
    font-size: 0.6rem;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 0.05em;
  }

  .goal-settings button:hover { background: rgba(255,255,255,0.3); }

  select option { background: #f7f9f7; color: #1a2e1a; }
</style>
</head>
<body>
<div class="app-wrap">

  <!-- HEADER -->
  <div class="app-header">
    <div class="app-logo">
      <div class="logo-leaf">🌿</div>
      <div>
        <div class="app-name">Nutri<em>Track</em></div>
      </div>
    </div>
    <div class="app-tagline" id="todayLabel"></div>
  </div>

  <!-- GOAL CARD -->
  <div class="goal-card">
    <div class="goal-top">
      <div>
        <div class="goal-label">Today's Intake</div>
        <div class="goal-numbers">
          <div class="goal-consumed" id="consumedCals">0</div>
          <div>
            <div class="goal-slash">/</div>
          </div>
          <div class="goal-target" id="targetLabel">2000</div>
        </div>
        <div class="goal-kcal">kcal consumed</div>
        <div class="goal-settings">
          <input type="number" id="goalInput" placeholder="Goal" min="500" max="5000">
          <button onclick="setGoal()">Set</button>
        </div>
      </div>
      <div class="goal-remaining">
        <div class="remaining-num" id="remainingNum">2000</div>
        <div class="remaining-label" id="remainingLabel">kcal left</div>
      </div>
    </div>
    <div class="goal-bar-track">
      <div class="goal-bar-fill" id="goalBarFill" style="width:0%"></div>
    </div>
    <div class="goal-bar-labels">
      <span>0</span>
      <span id="halfGoal">1000</span>
      <span id="fullGoal">2000 kcal</span>
    </div>
  </div>

  <!-- MACROS -->
  <div class="macros-row">
    <div class="macro-card">
      <div class="macro-icon">🍗</div>
      <div class="macro-val" id="proteinTotal">0</div>
      <div class="macro-unit">grams</div>
      <div class="macro-label">Protein</div>
    </div>
    <div class="macro-card">
      <div class="macro-icon">🌾</div>
      <div class="macro-val" id="carbsTotal">0</div>
      <div class="macro-unit">grams</div>
      <div class="macro-label">Carbs</div>
    </div>
    <div class="macro-card">
      <div class="macro-icon">🥑</div>
      <div class="macro-val" id="fatTotal">0</div>
      <div class="macro-unit">grams</div>
      <div class="macro-label">Fat</div>
    </div>
  </div>

  <!-- ADD MEAL -->
  <div class="add-section">
    <div class="section-label">// Log a meal</div>
    <div class="add-grid">
      <input type="text" class="form-input" id="foodName" placeholder="Food name (e.g. Grilled Chicken)">
      <button class="add-food-btn" onclick="addFood()">+ Log</button>
    </div>
    <div class="add-grid-bottom">
      <input type="number" class="form-input" id="foodCals" placeholder="Calories" min="0">
      <input type="number" class="form-input" id="foodProtein" placeholder="Protein (g)" min="0">
      <input type="number" class="form-input" id="foodCarbs" placeholder="Carbs (g)" min="0">
      <input type="number" class="form-input" id="foodFat" placeholder="Fat (g)" min="0">
    </div>
  </div>

  <!-- QUICK ADD -->
  <div class="quick-section">
    <div class="quick-label">// Quick add common foods</div>
    <div class="quick-grid" id="quickGrid"></div>
  </div>

  <!-- LOG -->
  <div class="log-section">
    <div class="log-header">
      <div class="log-title">// Today's food log</div>
      <button class="log-clear" onclick="clearLog()">Clear all</button>
    </div>
    <div class="log-list" id="logList"></div>
    <div class="log-empty" id="logEmpty">
      <p>No meals logged yet.<br>Add something above!</p>
    </div>
  </div>

</div>

<script>
const STORAGE_KEY = 'nutritrack_data';
const TODAY = new Date().toDateString();

let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

// Reset if new day
if (data.date !== TODAY) {
  data = { date: TODAY, goal: 2000, log: [] };
  saveData();
}

const quickFoods = [
  { name: 'Banana', icon: '🍌', cals: 89, protein: 1, carbs: 23, fat: 0 },
  { name: 'Egg', icon: '🥚', cals: 72, protein: 6, carbs: 0, fat: 5 },
  { name: 'Rice (1 cup)', icon: '🍚', cals: 206, protein: 4, carbs: 45, fat: 0 },
  { name: 'Coffee (black)', icon: '☕', cals: 5, protein: 0, carbs: 0, fat: 0 },
  { name: 'Chicken breast', icon: '🍗', cals: 165, protein: 31, carbs: 0, fat: 4 },
  { name: 'Apple', icon: '🍎', cals: 95, protein: 0, carbs: 25, fat: 0 },
  { name: 'Bread (1 slice)', icon: '🍞', cals: 80, protein: 3, carbs: 15, fat: 1 },
  { name: 'Milk (1 cup)', icon: '🥛', cals: 149, protein: 8, carbs: 12, fat: 8 },
];

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function addFood() {
  const name = document.getElementById('foodName').value.trim();
  const cals = parseInt(document.getElementById('foodCals').value) || 0;
  const protein = parseInt(document.getElementById('foodProtein').value) || 0;
  const carbs = parseInt(document.getElementById('foodCarbs').value) || 0;
  const fat = parseInt(document.getElementById('foodFat').value) || 0;

  if (!name || cals === 0) {
    document.getElementById('foodName').focus();
    return;
  }

  data.log.push({ id: Date.now(), name, cals, protein, carbs, fat, time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) });
  saveData();

  document.getElementById('foodName').value = '';
  document.getElementById('foodCals').value = '';
  document.getElementById('foodProtein').value = '';
  document.getElementById('foodCarbs').value = '';
  document.getElementById('foodFat').value = '';
  document.getElementById('foodName').focus();

  render();
}

function addQuick(food) {
  data.log.push({ id: Date.now(), name: food.icon + ' ' + food.name, cals: food.cals, protein: food.protein, carbs: food.carbs, fat: food.fat, time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) });
  saveData();
  render();
}

function deleteItem(id) {
  data.log = data.log.filter(i => i.id !== id);
  saveData();
  render();
}

function clearLog() {
  data.log = [];
  saveData();
  render();
}

function setGoal() {
  const val = parseInt(document.getElementById('goalInput').value);
  if (val >= 500 && val <= 5000) {
    data.goal = val;
    saveData();
    render();
    document.getElementById('goalInput').value = '';
  }
}

function render() {
  const total = data.log.reduce((s, i) => s + i.cals, 0);
  const protein = data.log.reduce((s, i) => s + i.protein, 0);
  const carbs = data.log.reduce((s, i) => s + i.carbs, 0);
  const fat = data.log.reduce((s, i) => s + i.fat, 0);
  const goal = data.goal;
  const remaining = goal - total;
  const pct = Math.min(Math.round((total / goal) * 100), 100);
  const over = total > goal;

  document.getElementById('consumedCals').textContent = total;
  document.getElementById('targetLabel').textContent = goal;
  document.getElementById('remainingNum').textContent = Math.abs(remaining);
  document.getElementById('remainingLabel').textContent = over ? 'kcal over' : 'kcal left';
  document.getElementById('goalBarFill').style.width = pct + '%';
  document.getElementById('goalBarFill').className = 'goal-bar-fill' + (over ? ' over' : '');
  document.getElementById('halfGoal').textContent = Math.round(goal / 2);
  document.getElementById('fullGoal').textContent = goal + ' kcal';
  document.getElementById('proteinTotal').textContent = protein;
  document.getElementById('carbsTotal').textContent = carbs;
  document.getElementById('fatTotal').textContent = fat;

  const logList = document.getElementById('logList');
  const logEmpty = document.getElementById('logEmpty');

  if (data.log.length === 0) {
    logList.innerHTML = '';
    logEmpty.style.display = 'block';
  } else {
    logEmpty.style.display = 'none';
    const mealIcons = ['🥗', '🍳', '🥙', '🍱', '🥘', '🍜', '🥪', '🍲'];
    logList.innerHTML = [...data.log].reverse().map(item => `
      <div class="log-item">
        <div class="log-meal-icon">${mealIcons[item.id % mealIcons.length]}</div>
        <div class="log-body">
          <div class="log-name">${escHtml(item.name)}</div>
          <div class="log-meta">
            <span>${item.time}</span>
            ${item.protein ? `<span>P: ${item.protein}g</span>` : ''}
            ${item.carbs ? `<span>C: ${item.carbs}g</span>` : ''}
            ${item.fat ? `<span>F: ${item.fat}g</span>` : ''}
          </div>
        </div>
        <div class="log-cals">${item.cals}</div>
        <button class="log-del" onclick="deleteItem(${item.id})">✕</button>
      </div>
    `).join('');
  }
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Date label
const d = new Date();
document.getElementById('todayLabel').textContent =
  d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }).toUpperCase();

// Quick add buttons
document.getElementById('quickGrid').innerHTML = quickFoods.map((f, i) => `
  <button class="quick-btn" onclick="addQuick(quickFoods[${i}])">${f.icon} ${f.name} · ${f.cals}</button>
`).join('');

// Enter key
document.getElementById('foodCals').addEventListener('keydown', e => {
  if (e.key === 'Enter') addFood();
});

document.getElementById('goalInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') setGoal();
});

render();
</script>
</body>
</html>
